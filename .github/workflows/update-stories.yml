name: Update Tax Policy Stories

on:
  workflow_dispatch:
  schedule:
    - cron: '12 * * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: tax-policy-widget
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape stories
        run: python scripts/scrape.py

      - name: Commit story archive if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/stories.json
          if git diff --cached --quiet; then
            echo "No story changes."
            exit 0
          fi
          git commit -m "Update tax policy stories"
          git pull --rebase origin main
          git push origin HEAD:main

  deploy:
    needs: update
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
